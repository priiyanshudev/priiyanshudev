name: Metrics

on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: priiyanshudev
          template: classic
          base: header, activity, community, repositories
          plugin_languages: yes
          plugin_habits: yes
          plugin_isocalendar: yes
